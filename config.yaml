# ============================================================
#  毎回ここだけ編集すればOK（コードは触らない）
# ============================================================

# 今週のメインテーマ（空欄でOK。空の場合はGeminiが自動で時事ネタからテーマを選びます）
# 指定したい場合のみ書く（例: "中東情勢の再燃と建材価格への影響"）
theme: ""

# 検索キーワード（任意。空でも自動探索します。指定すると検索の方向づけに使われます）
keywords: "住宅業界 建材 価格 受注 金利 制度 工務店"

# 使用するメールの型（v1_event / v2_simple / v3_gift）
# v1_event: セミナー・イベント案内パターン
# v2_simple: シンプルな資料共有パターン（標準）
# v3_gift: 資料プレゼントパターン（短縮版）
email_template: "v2_simple"

# 会社差出人情報（署名に使われます。基本は変えなくてOK）
sender:
  company: "MARKEY CONSULTING"
  name: "鶴田　槙人"
  tel: "080-4679-1402"
  mail: "m.tsuruta@markey-consulting.com"
  hp: "https://markey-consulting.com/"

# 使用するGeminiモデル（無料枠で十分。基本変えなくてOK）
# 速度優先: gemini-2.5-flash  /  品質優先: gemini-2.5-pro
model: "gemini-2.5-flash"

# Google Drive 保存先フォルダID（任意。空ならマイドライブ直下に作成）
drive_folder_id: ""
